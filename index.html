<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>티카투카 어드바이저</title>
<style>
  :root {
    --bg: #0d111e; --bg-grad1: #131a30; --bg-grad2: #0b0f1b;
    --panel: #181f33; --panel-2: #1f2840; --line: #2a3350; --line-soft: #222a44;
    --ink: #e9eefb; --muted: #93a0bf;
    --me: #4aa8ff; --opp: #ff7a85; --win: #2fce8f; --lose: #4a5270;
    --gold: #f5c043; --accent: #6c8cff;
    --radius: 14px; --radius-sm: 10px;
    --shadow: 0 8px 24px rgba(0,0,0,.30); --shadow-sm: 0 2px 8px rgba(0,0,0,.20);
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0; color: var(--ink); background: var(--bg);
    background-image: radial-gradient(1100px 560px at 50% -12%, var(--bg-grad1), transparent 62%),
                      linear-gradient(180deg, var(--bg-grad2), var(--bg));
    background-attachment: fixed;
    font-family: -apple-system, "Apple SD Gothic Neo", "Segoe UI", system-ui, sans-serif;
    padding: 22px 16px 40px; line-height: 1.45;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  }
  h1 {
    font-size: 21px; margin: 0 0 3px; letter-spacing: -.01em; font-weight: 800;
    background: linear-gradient(90deg, var(--me), var(--accent));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 18px; }
  .wrap { max-width: 780px; margin: 0 auto; }
  .tabs { display: flex; gap: 4px; margin: 6px 0 16px; border-bottom: 1px solid var(--line); }
  .tab {
    background: transparent; border: none; color: var(--muted); font-size: 14px; font-weight: 700;
    padding: 9px 16px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: color .12s, border-color .12s;
  }
  .tab:hover { color: var(--ink); }
  .tab.sel { color: var(--ink); border-bottom-color: var(--accent); }
  #pDice .die { display: inline-flex; vertical-align: middle; }
  #pDice .die + .die { margin-left: 6px; }
  .die.cand { cursor: pointer; }
  .die.cand.sel { outline: 2px solid var(--accent); outline-offset: 1px; }
  /* 플레이 모드 애니메이션 */
  @keyframes diePop { 0% { transform: scale(.3); opacity: 0; } 60% { transform: scale(1.15); } 100% { transform: scale(1); opacity: 1; } }
  @keyframes rollShake { 0% { transform: translateY(0) rotate(-10deg); } 50% { transform: translateY(-4px) rotate(10deg); } 100% { transform: translateY(0) rotate(-10deg); } }
  @keyframes fieldFlash { 0% { box-shadow: 0 0 0 0 rgba(108,140,255,0); } 25% { box-shadow: 0 0 0 3px var(--accent), 0 0 20px rgba(108,140,255,.65); } 100% { box-shadow: 0 0 0 0 rgba(108,140,255,0); } }
  @keyframes fieldFlashAlk { 0% { box-shadow: 0 0 0 0 rgba(255,122,133,0); } 25% { box-shadow: 0 0 0 3px var(--opp), 0 0 20px rgba(255,122,133,.75); } 100% { box-shadow: 0 0 0 0 rgba(255,122,133,0); } }
  .die.pop { animation: diePop .34s cubic-bezier(.2,.9,.3,1.3); }
  .die.rolling { animation: rollShake .12s linear infinite; background: linear-gradient(160deg,#fff,#cdd8ee); }
  .field.flash { animation: fieldFlash .75s ease-out; }
  .field.flash-alk { animation: fieldFlashAlk .75s ease-out; }
  #pMyBoard.glow-me, #pOppBoard.glow-opp { border-radius: var(--radius); }
  #pMyBoard.glow-me { box-shadow: 0 0 0 2px var(--me), 0 0 22px rgba(74,168,255,.22); }
  #pOppBoard.glow-opp { box-shadow: 0 0 0 2px var(--opp), 0 0 22px rgba(255,122,133,.22); }
  #pMyBoard, #pOppBoard { transition: box-shadow .25s; padding: 2px; }
  .turn-badge { display: inline-block; font-weight: 800; padding: 3px 11px; border-radius: 999px; font-size: 13px; vertical-align: middle; }
  .turn-badge.me { background: rgba(74,168,255,.16); color: var(--me); border: 1px solid var(--me); }
  .turn-badge.opp { background: rgba(255,122,133,.16); color: var(--opp); border: 1px solid var(--opp); }
  #pDice .die { width: 46px; height: 46px; font-size: 22px; }
  #pMsg { min-height: 20px; font-weight: 600; }
  #pRoll { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 800; padding: 9px 18px; }
  .verdict { text-align: center; font-size: 15px; margin: 6px 0 10px; min-height: 22px; color: var(--muted); }
  .verdict b { font-size: 18px; }

  .winrate { max-width: 480px; margin: 0 auto 14px; }
  .wrLabel { text-align: center; font-size: 13px; color: var(--muted); margin-bottom: 7px; }
  .wrLabel b { color: var(--ink); font-size: 17px; }
  .wrBar {
    position: relative; height: 16px; border-radius: 999px; overflow: hidden;
    background: linear-gradient(180deg, var(--opp), #f0656f);
    border: 1px solid rgba(0,0,0,.25); box-shadow: inset 0 1px 2px rgba(0,0,0,.35);
  }
  .wrFill {
    height: 100%; width: 50%; background: linear-gradient(180deg, var(--me), #2f93f0);
    transition: width .4s cubic-bezier(.4,0,.2,1); border-radius: 999px 0 0 999px;
  }
  .wrBar::after {
    content: ""; position: absolute; top: 0; bottom: 0; left: 50%;
    width: 2px; background: rgba(255,255,255,.35); transform: translateX(-1px);
  }

  .tabletop { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-items: start; margin-top: 6px; }
  .board { display: grid; grid-template-columns: 1fr; gap: 10px; }
  .side-label { color: var(--muted); font-size: 12px; margin: 0 0 8px; letter-spacing: .06em; text-align: center; font-weight: 800; }
  .side.me .side-label { color: var(--me); }
  .side.opp .side-label { color: var(--opp); }
  .field {
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    border: 2px solid var(--line); border-radius: var(--radius);
    padding: 11px 10px 9px; min-height: 98px; cursor: pointer; position: relative;
    display: flex; flex-direction: column; align-items: center; gap: 7px; box-shadow: var(--shadow-sm);
    transition: border-color .14s, transform .1s, box-shadow .14s, background .14s;
  }
  .field:hover { border-color: var(--accent); transform: translateY(-1px); }
  .field.clickable { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset, var(--shadow-sm); }
  .field.recommend { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold) inset, 0 0 18px rgba(245,192,67,.30); }
  .field.win { background: linear-gradient(180deg, #1b3a2c, #163026); border-color: #2a6a4f; }
  .field.lose { opacity: .72; }
  .slots { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; min-height: 44px; width: 100%; }
  /* 주사위는 중앙(양 판이 맞닿는 안쪽)부터 채워지도록 정렬 */
  .side.me .slots { justify-content: flex-end; }
  .side.opp .slots { justify-content: flex-start; }
  .die {
    width: 40px; height: 40px; border-radius: 10px;
    background: linear-gradient(160deg, #f6f9ff, #dde6f7); color: #16203a;
    border: 2px solid rgba(255,255,255,.5);
    font-weight: 800; font-size: 20px; display: flex; align-items: center; justify-content: center;
    box-shadow: inset 0 -3px 0 rgba(0,0,0,.12), 0 2px 5px rgba(0,0,0,.30); position: relative;
  }
  .die.shield {
    background: linear-gradient(160deg,#ffe39a,#f5c043); border-color: #e87a00;
    box-shadow: 0 0 8px rgba(232,122,0,.55), inset 0 -3px 0 rgba(0,0,0,.12), 0 2px 5px rgba(0,0,0,.30);
  }
  /* 소유/출처 테두리색: 파랑=나, 빨강=상대 (모든 주사위 공통). 실드는 노란 채움으로 구분. */
  .die.own-me { border-color: var(--me); box-shadow: 0 0 0 1px rgba(74,168,255,.35), inset 0 -3px 0 rgba(0,0,0,.12), 0 2px 5px rgba(0,0,0,.30); }
  .die.own-opp { border-color: var(--opp); box-shadow: 0 0 0 1px rgba(255,122,133,.35), inset 0 -3px 0 rgba(0,0,0,.12), 0 2px 5px rgba(0,0,0,.30); }
  /* 내가 깐 실드 = 파란 테두리, 상대가 깐 실드 = 빨간 테두리 */
  .die.shield-me { border-color: var(--me); box-shadow: 0 0 8px rgba(74,168,255,.6), inset 0 -3px 0 rgba(0,0,0,.12), 0 2px 5px rgba(0,0,0,.30); }
  .die.shield-opp { border-color: var(--opp); box-shadow: 0 0 8px rgba(255,122,133,.6), inset 0 -3px 0 rgba(0,0,0,.12), 0 2px 5px rgba(0,0,0,.30); }
  .slot-empty { width: 40px; height: 40px; border-radius: 10px; border: 2px dashed #313a5c; background: rgba(255,255,255,.02); }
  .fscore { font-size: 12px; color: var(--muted); }
  .fscore b { color: var(--ink); font-size: 15px; }
  .winpill {
    position: absolute; top: -11px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: #fff; font-size: 11.5px; font-weight: 800;
    padding: 2px 9px; border-radius: 999px; white-space: nowrap; box-shadow: var(--shadow-sm);
  }
  .winpill.alk { background: var(--opp); }
  .winpill.best { background: var(--gold); color: #2a2000; }
  .winpill.oppbest { background: var(--opp); color: #fff; box-shadow: 0 0 10px rgba(255,122,133,.6); }

  .panel {
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    border: 1px solid var(--line); border-radius: var(--radius);
    padding: 16px; margin-top: 16px; box-shadow: var(--shadow);
  }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .row + .row { margin-top: 12px; }
  .label { font-size: 12px; color: var(--muted); min-width: 56px; font-weight: 600; letter-spacing: .03em; }
  .turnbtn, .die-btn, button.act {
    border: 1px solid var(--line); background: #232b42; color: var(--ink);
    border-radius: var(--radius-sm); padding: 8px 13px; font-size: 14px; cursor: pointer;
    transition: filter .12s, background .12s, border-color .12s, transform .08s;
  }
  button.act:active, .die-btn:active, .turnbtn:active { transform: translateY(1px); }
  .die-btn { width: 44px; height: 44px; font-size: 18px; font-weight: 800; padding: 0; }
  .die-btn.sel { outline: 2px solid var(--accent); outline-offset: 1px; background: #2c3a63; }
  .turnbtn.sel { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 0 0 1px var(--accent); }
  button.act:hover, .die-btn:hover, .turnbtn:hover { filter: brightness(1.15); }
  button.ghost { background: transparent; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  #rerollBtn.reroll-good {
    background: var(--win); border-color: var(--win); color: #06281c; font-weight: 800;
    box-shadow: 0 0 0 0 rgba(47,206,143,.7); animation: rerollPulse 1.1s ease-out infinite;
  }
  @keyframes rerollPulse {
    0% { box-shadow: 0 0 0 0 rgba(47,206,143,.7); }
    70% { box-shadow: 0 0 0 9px rgba(47,206,143,0); }
    100% { box-shadow: 0 0 0 0 rgba(47,206,143,0); }
  }
  #holdBtn.hold-good {
    background: var(--gold); border-color: var(--gold); color: #2a2000; font-weight: 800;
  }
  #restartBtn, #startBtn {
    background: var(--gold); border-color: var(--gold); color: #2a2000; font-weight: 800;
    padding: 10px 22px; box-shadow: var(--shadow-sm);
  }
  .act:disabled, .die-btn:disabled, .turnbtn:disabled { opacity: .38; cursor: default; filter: none; transform: none; }
  .rerollBanner {
    margin-top: 12px; padding: 10px 13px; border-radius: var(--radius-sm); font-size: 13.5px; font-weight: 700;
    display: none;
  }
  .rerollBanner.show { display: block; }
  .rerollBanner.good { background: rgba(47,206,143,.13); border: 1px solid var(--win); color: var(--win); }
  .rerollBanner.bad { background: rgba(148,160,189,.10); border: 1px solid var(--lose); color: var(--muted); }
  .hint { color: var(--muted); font-size: 13px; }
  .results { font-size: 12.5px; color: var(--muted); margin-top: 10px; white-space: pre-line; line-height: 1.7; }
  .histbl { width: 100%; border-collapse: collapse; font-size: 13px; }
  .histbl thead th { color: var(--muted); font-weight: 700; font-size: 11.5px; text-align: left; letter-spacing: .04em; padding: 4px 9px 8px; border-bottom: 1px solid var(--line); }
  .histbl td { text-align: left; padding: 7px 9px; border-bottom: 1px solid var(--line-soft); }
  .histbl tbody tr:nth-child(even) { background: rgba(255,255,255,.025); }
  .histbl tbody tr:last-child td { border-bottom: none; }
  .histbl td.num, .histbl th.num { text-align: right; font-variant-numeric: tabular-nums; }
  .histbl .who-me { color: var(--me); font-weight: 800; }
  .histbl .who-opp { color: var(--opp); font-weight: 800; }
  .histbl .wrcell { font-weight: 800; color: var(--ink); }
  .histbl .delta-up { color: var(--win); font-weight: 700; }
  .histbl .delta-down { color: var(--opp); font-weight: 700; }
  .histbl .delta-flat { color: var(--muted); }
  input[type=text] {
    background: #10162a; border: 1px solid var(--line); color: var(--ink);
    border-radius: 8px; padding: 7px 10px; font-size: 13px; width: 150px;
  }
  input[type=text]:focus { border-color: var(--accent); outline: none; }
  label.chk { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  details { margin-top: 14px; border-top: 1px solid var(--line-soft); padding-top: 12px; }
  summary { cursor: pointer; color: var(--muted); font-size: 13px; font-weight: 600; list-style: none; user-select: none; }
  summary::-webkit-details-marker { display: none; }
  summary::before { content: "\25B8"; display: inline-block; margin-right: 6px; transition: transform .15s; }
  details[open] summary::before { transform: rotate(90deg); }

  .modal-bg {
    position: fixed; inset: 0; background: rgba(5,8,16,.62); backdrop-filter: blur(4px); display: none;
    align-items: center; justify-content: center; z-index: 20; padding: 16px;
  }
  .modal-bg.show { display: flex; animation: fadeIn .15s ease; }
  .modal {
    background: linear-gradient(180deg, var(--panel-2), var(--panel)); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 20px; max-width: 360px; width: 100%; text-align: center;
    box-shadow: var(--shadow); animation: pop .18s cubic-bezier(.2,.8,.3,1.2);
  }
  .modal h3 { margin: 0 0 8px; font-size: 16px; }
  .modal .row { justify-content: center; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pop { from { transform: scale(.94); opacity: .6; } to { transform: scale(1); opacity: 1; } }
  @media (max-width: 560px) {
    body { padding: 16px 12px 32px; }
    .tabletop { gap: 10px; }
    .panel { padding: 13px; }
    .die-btn { width: 40px; height: 40px; }
    .histbl td, .histbl thead th { padding-left: 6px; padding-right: 6px; }
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>티카투카</h1>
  <div class="sub">2인 주사위 보드게임 — 승률 어드바이저 &amp; 혼자 플레이</div>

  <div class="tabs">
    <button class="tab sel" id="tabAdvisor">어드바이저</button>
    <button class="tab" id="tabPlay">혼자 플레이</button>
  </div>

  <div id="paneAdvisor">
  <div class="verdict" id="verdict"></div>

  <div style="text-align:center; margin:4px 0 8px;">
    <button class="act" id="restartBtn" style="display:none">↻ 새 게임</button>
    <button class="act" id="startBtn">게임 시작</button>
  </div>

  <div class="winrate" id="winrate">
    <div class="wrLabel" id="wrLabel"></div>
    <div class="wrBar"><div class="wrFill" id="wrFill"></div></div>
  </div>

  <div class="tabletop">
    <div class="side me">
      <div class="side-label">나 (왼쪽)</div>
      <div id="myBoard" class="board"></div>
    </div>
    <div class="side opp">
      <div class="side-label">상대 (오른쪽)</div>
      <div id="oppBoard" class="board"></div>
    </div>
  </div>

  <div class="panel">
    <div class="row">
      <span class="label">차례</span>
      <button class="turnbtn sel" data-turn="me" id="turnMe">내 차례</button>
      <button class="turnbtn" data-turn="opp" id="turnOpp">상대 차례</button>
      <span class="hint" id="turnHint">주사위 눈을 고르세요.</span>
    </div>
    <div class="row">
      <span class="label">주사위</span>
      <span id="dieBtns"></span>
      <button class="act ghost" id="rerollBtn" title="리롤: 두 눈 중 선택">리롤</button>
      <button class="act ghost" id="holdBtn" title="홀드: 더 안 두고 상대만 진행">홀드</button>
      <button class="act ghost" id="undoBtn" title="마지막 수 되돌리기">되돌리기</button>
      <button class="act ghost" id="shieldRerollBtn" title="선턴 실드 다시 굴리기" style="display:none">↻ 실드 다시 굴리기</button>
    </div>
    <div class="rerollBanner" id="rerollBanner"></div>
    <div class="row" id="actionRow">
      <span class="label"></span>
      <span class="hint" id="actionHint"></span>
    </div>
    <div class="results" id="results"></div>

    <details>
      <summary>설정</summary>
      <div class="row" style="margin-top:10px">
        <span class="label">시뮬</span>
        <input type="text" id="simsInput" value="1500" style="width:80px" />
        <span class="hint">횟수↑ = 정확↑ / 느림</span>
      </div>
      <div class="row">
        <button class="act" id="resetBtn">새 게임</button>
      </div>
    </details>
  </div>

  <div class="panel" id="historyPanel" style="display:none">
    <div class="label" style="min-width:auto; margin-bottom:8px">행동 이력 · 내 승률 변화</div>
    <table class="histbl" id="histbl"></table>
  </div>
  </div><!-- /paneAdvisor -->

  <div id="panePlay" style="display:none">
    <div class="verdict" id="pVerdict"></div>
    <div class="winrate">
      <div class="wrLabel" id="pWrLabel"></div>
      <div class="wrBar"><div class="wrFill" id="pWrFill"></div></div>
    </div>

    <div class="tabletop">
      <div class="side me">
        <div class="side-label">나 (왼쪽)</div>
        <div id="pMyBoard" class="board"></div>
      </div>
      <div class="side opp">
        <div class="side-label">상대 AI (오른쪽)</div>
        <div id="pOppBoard" class="board"></div>
      </div>
    </div>

    <div class="panel">
      <div class="row">
        <span class="label">내 턴</span>
        <button class="act" id="pRoll">주사위 굴리기</button>
        <span id="pDice"></span>
        <button class="act ghost" id="pReroll" style="display:none">리롤</button>
        <button class="act ghost" id="pHold" style="display:none">홀드</button>
      </div>
      <div class="row"><span class="hint" id="pMsg"></span></div>
      <div class="row" style="justify-content:space-between">
        <button class="act" id="pNew">새 게임</button>
        <label class="chk"><input type="checkbox" id="pHint" /> 힌트(추천 수) 표시</label>
      </div>
    </div>

    <div class="panel" id="pHistoryPanel" style="display:none">
      <div class="label" style="min-width:auto; margin-bottom:8px">행동 이력 · 내 승률 변화</div>
      <table class="histbl" id="pHistbl"></table>
    </div>
  </div>
</div>

<div class="modal-bg" id="pStartBg">
  <div class="modal">
    <h3>혼자 플레이 — 선턴 추첨</h3>
    <div class="hint">선턴을 무작위로 정합니다. 선턴은 실드 주사위로 시작하고, 상대는 AI가 자동으로 둡니다.</div>
    <div class="row" id="pStartDice" style="margin-top:12px"></div>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle">실드 주사위</h3>
    <div class="hint" id="modalHint"></div>
    <div class="row" id="modalDice" style="margin-top:10px"></div>
  </div>
</div>

<script src="engine.js"></script>
<script src="app.js"></script>
<script src="play.js"></script>
</body>
</html>
