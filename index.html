<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>티카투카 어드바이저</title>
<style>
  :root {
    --bg: #0f1320; --panel: #1a2032; --line: #2b3350; --ink: #e7ecf6;
    --muted: #94a0bd; --me: #3da9fc; --opp: #ff7a7a; --win: #2fce8f;
    --lose: #4a5270; --gold: #f5c043; --accent: #6c8cff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, "Apple SD Gothic Neo", "Segoe UI", system-ui, sans-serif;
    padding: 18px; line-height: 1.4;
  }
  h1 { font-size: 19px; margin: 0 0 2px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 14px; }
  .wrap { max-width: 760px; margin: 0 auto; }
  .verdict { text-align: center; font-size: 15px; margin: 10px 0 4px; min-height: 22px; }
  .verdict b { font-size: 17px; }

  .winrate { max-width: 460px; margin: 0 auto 6px; }
  .wrLabel { text-align: center; font-size: 13px; color: var(--muted); margin-bottom: 5px; }
  .wrLabel b { color: var(--ink); font-size: 16px; }
  .wrBar {
    height: 14px; border-radius: 999px; overflow: hidden;
    background: var(--opp); border: 1px solid var(--line);
  }
  .wrFill {
    height: 100%; width: 50%; background: var(--me);
    transition: width .35s ease; border-radius: 999px 0 0 999px;
  }

  .tabletop { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; margin-top: 8px; }
  .board { display: grid; grid-template-columns: 1fr; gap: 10px; }
  .side-label { color: var(--muted); font-size: 13px; margin: 0 0 6px; letter-spacing: .04em; text-align: center; font-weight: 700; }
  .side.me .side-label { color: var(--me); }
  .side.opp .side-label { color: var(--opp); }
  .field {
    background: var(--panel); border: 2px solid var(--line); border-radius: 12px;
    padding: 10px; min-height: 96px; cursor: pointer; position: relative;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    transition: border-color .12s, transform .08s, box-shadow .12s;
  }
  .field:hover { border-color: var(--accent); }
  .field.clickable { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
  .field.recommend { border-color: var(--gold); box-shadow: 0 0 14px rgba(245,192,67,.35); }
  .field.win { background: #173026; }
  .field.lose { opacity: .82; }
  .slots { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; min-height: 44px; width: 100%; }
  /* 주사위는 중앙(양 판이 맞닿는 안쪽)부터 채워지도록 정렬 */
  .side.me .slots { justify-content: flex-end; }
  .side.opp .slots { justify-content: flex-start; }
  .die {
    width: 40px; height: 40px; border-radius: 9px; background: #eef2fb; color: #16203a;
    border: 3px solid transparent;
    font-weight: 800; font-size: 20px; display: flex; align-items: center; justify-content: center;
    box-shadow: inset 0 -3px 0 rgba(0,0,0,.12); position: relative;
  }
  .die.shield {
    background: linear-gradient(160deg,#ffe39a,#f5c043);
    border-color: #e87a00;
    box-shadow: 0 0 7px rgba(232,122,0,.6), inset 0 -3px 0 rgba(0,0,0,.12);
  }
  .die.shield::after {
    content: "S"; position: absolute; top: -6px; right: -6px; font-size: 10px; font-weight: 800;
    background: var(--gold); color: #3a2c00; border-radius: 50%; width: 16px; height: 16px;
    display: flex; align-items: center; justify-content: center; border: 1px solid #3a2c00;
  }
  /* 내가 깐 실드 = 파란 테두리/배지(나), 상대가 깐 실드 = 빨간 테두리/배지(상) */
  .die.shield-me { border-color: var(--me); box-shadow: 0 0 7px rgba(61,169,252,.6), inset 0 -3px 0 rgba(0,0,0,.12); }
  .die.shield-me::after { content: "나"; background: var(--me); color: #04203b; border-color: #04203b; }
  .die.shield-opp { border-color: var(--opp); box-shadow: 0 0 7px rgba(255,122,122,.6), inset 0 -3px 0 rgba(0,0,0,.12); }
  .die.shield-opp::after { content: "상"; background: var(--opp); color: #3b0606; border-color: #3b0606; }
  .slot-empty { width: 40px; height: 40px; border-radius: 9px; border: 2px dashed #313a5c; }
  .fscore { font-size: 13px; color: var(--muted); }
  .fscore b { color: var(--ink); font-size: 15px; }
  .winpill {
    position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: #fff; font-size: 12px; font-weight: 700;
    padding: 2px 9px; border-radius: 999px; white-space: nowrap;
  }
  .winpill.alk { background: var(--opp); }
  .winpill.best { background: var(--gold); color: #2a2000; }
  .winpill.oppbest { background: var(--opp); color: #fff; box-shadow: 0 0 8px rgba(255,122,122,.6); }

  .panel {
    background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
    padding: 14px; margin-top: 16px;
  }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .row + .row { margin-top: 12px; }
  .label { font-size: 13px; color: var(--muted); min-width: 64px; }
  .turnbtn, .die-btn, button.act {
    border: 1px solid var(--line); background: #232b42; color: var(--ink);
    border-radius: 10px; padding: 8px 12px; font-size: 14px; cursor: pointer;
  }
  .die-btn { width: 44px; height: 44px; font-size: 18px; font-weight: 800; padding: 0; }
  .die-btn.sel { outline: 2px solid var(--accent); background: #2c3a63; }
  .turnbtn.sel { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.act:hover, .die-btn:hover, .turnbtn:hover { filter: brightness(1.15); }
  button.ghost { background: transparent; }
  #rerollBtn.reroll-good {
    background: var(--win); border-color: var(--win); color: #06281c; font-weight: 800;
    box-shadow: 0 0 0 0 rgba(47,206,143,.7); animation: rerollPulse 1.1s ease-out infinite;
  }
  @keyframes rerollPulse {
    0% { box-shadow: 0 0 0 0 rgba(47,206,143,.7); }
    70% { box-shadow: 0 0 0 9px rgba(47,206,143,0); }
    100% { box-shadow: 0 0 0 0 rgba(47,206,143,0); }
  }
  #holdBtn.hold-good {
    background: var(--gold); border-color: var(--gold); color: #2a2000; font-weight: 800;
  }
  .rerollBanner {
    margin-top: 10px; padding: 9px 12px; border-radius: 10px; font-size: 14px; font-weight: 700;
    display: none;
  }
  .rerollBanner.show { display: block; }
  .rerollBanner.good { background: rgba(47,206,143,.15); border: 1px solid var(--win); color: var(--win); }
  .rerollBanner.bad { background: rgba(148,160,189,.1); border: 1px solid var(--lose); color: var(--muted); }
  .hint { color: var(--muted); font-size: 13px; }
  .results { font-size: 13px; color: var(--muted); margin-top: 8px; white-space: pre-line; }
  input[type=text] {
    background: #11162a; border: 1px solid var(--line); color: var(--ink);
    border-radius: 8px; padding: 7px 9px; font-size: 13px; width: 150px;
  }
  label.chk { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  details { margin-top: 12px; }
  summary { cursor: pointer; color: var(--muted); font-size: 13px; }

  .modal-bg {
    position: fixed; inset: 0; background: rgba(5,8,16,.6); display: none;
    align-items: center; justify-content: center; z-index: 20;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
    padding: 18px; max-width: 360px; text-align: center;
  }
  .modal h3 { margin: 0 0 6px; font-size: 16px; }
  .modal .row { justify-content: center; }
</style>
</head>
<body>
<div class="wrap">
  <h1>티카투카 어드바이저</h1>
  <div class="sub">주사위 눈을 누르면 필드별 승률을 계산해 최선의 수를 추천합니다.</div>

  <div class="verdict" id="verdict"></div>

  <div class="winrate" id="winrate">
    <div class="wrLabel" id="wrLabel"></div>
    <div class="wrBar"><div class="wrFill" id="wrFill"></div></div>
  </div>

  <div class="tabletop">
    <div class="side me">
      <div class="side-label">나 (왼쪽)</div>
      <div id="myBoard" class="board"></div>
    </div>
    <div class="side opp">
      <div class="side-label">상대 (오른쪽)</div>
      <div id="oppBoard" class="board"></div>
    </div>
  </div>

  <div class="panel">
    <div class="row">
      <span class="label">차례</span>
      <button class="turnbtn sel" data-turn="me" id="turnMe">내 차례</button>
      <button class="turnbtn" data-turn="opp" id="turnOpp">상대 차례</button>
      <span class="hint" id="turnHint">주사위 눈을 고르세요.</span>
    </div>
    <div class="row">
      <span class="label">주사위</span>
      <span id="dieBtns"></span>
      <button class="act ghost" id="rerollBtn" title="리롤: 두 눈 중 선택">리롤</button>
      <button class="act ghost" id="holdBtn" title="홀드: 더 안 두고 상대만 진행">홀드</button>
      <button class="act ghost" id="shieldRerollBtn" title="선턴 실드 다시 굴리기" style="display:none">↻ 실드 다시 굴리기</button>
    </div>
    <div class="rerollBanner" id="rerollBanner"></div>
    <div class="row" id="actionRow">
      <span class="label"></span>
      <span class="hint" id="actionHint"></span>
    </div>
    <div class="results" id="results"></div>

    <details>
      <summary>설정</summary>
      <div class="row" style="margin-top:10px">
        <span class="label">시뮬</span>
        <input type="text" id="simsInput" value="1500" style="width:80px" />
        <span class="hint">횟수↑ = 정확↑ / 느림</span>
      </div>
      <div class="row">
        <button class="act" id="resetBtn">새 게임</button>
      </div>
    </details>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle">실드 주사위</h3>
    <div class="hint" id="modalHint"></div>
    <div class="row" id="modalDice" style="margin-top:10px"></div>
  </div>
</div>

<script src="engine.js"></script>
<script src="app.js"></script>
</body>
</html>
